<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Login System</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- LOGIN PAGE -->
<div class="login-box" id="loginPage">
    <h2>🔐 Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="msg"></p>
</div>

<!-- STUDENT DASHBOARD -->
<div id="dashboard">
    <h1>🎓 Student Dashboard</h1>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Department</th>
        </tr>

        <tr>
            <td>1</td>
            <td>Arun</td>
            <td>CSE</td>
        </tr>

        <tr>
            <td>2</td>
            <td>Divya</td>
            <td>IT</td>
        </tr>

        <tr>
            <td>3</td>
            <td>Rahul</td>
            <td>ECE</td>
        </tr>
    </table>

    <br><br>
    <button onclick="logout()">Logout</button>
</div>

<script src="script.js"></script>
</body>
</html>
